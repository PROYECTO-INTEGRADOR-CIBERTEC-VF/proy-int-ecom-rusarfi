<div class="space-y-1">
  <label
    class="block text-[10px] font-label uppercase tracking-[0.2em] text-on-surface-variant ml-1"
  >
    {{ label }}
  </label>
  <div class="relative rounded-lg bg-surface-container-high">
    <span
      *ngIf="icon"
      class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-lg"
    >
      {{ icon }}
    </span>
    <input
      [type]="type"
      [placeholder]="placeholder"
      [formControl]="control"
      [autocomplete]="autocomplete"
      (blur)="handleBlur()"
      class="w-full bg-transparent border-none rounded-lg text-sm font-body tracking-wider placeholder:text-stone-400 appearance-none shadow-none outline-none ring-0 focus:outline-none focus:ring-0 focus-visible:outline-none focus-visible:ring-0 invalid:outline-none invalid:ring-0 invalid:border-none invalid:shadow-none"
      [ngClass]="{
        'pl-12': icon,
          'pl-4': !icon,
          'pr-4': true,
          'py-4': true
      }"
    />
  </div>
  <div class="min-h-[1rem] pt-1 pl-1">
    <ng-content select="[error]"></ng-content>
  </div>
</div>
