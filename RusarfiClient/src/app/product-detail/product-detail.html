<div *ngIf="isLoading" class="pt-16 text-center text-sm text-stone-500">
  Cargando producto...
</div>

<div *ngIf="!isLoading && product" class="pt-8 pb-20 px-6 max-w-screen-2xl mx-auto">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">

    <div class="lg:col-span-7 grid grid-cols-2 gap-4">
      <div class="col-span-2 overflow-hidden rounded-lg bg-surface-container-low aspect-[4/5]">
        <img [src]="selectedImage || product.imageUrl" [alt]="product.name" class="product-main-image"/>
      </div>

      <div *ngIf="images.length" class="col-span-2 flex gap-3 overflow-x-auto">
        <button
          *ngFor="let img of images"
          type="button"
          (click)="selectImage(img)"
          [attr.aria-pressed]="img === selectedImage"
          class="thumbnail"
        >
          <img [src]="img" [alt]="product.name" />
        </button>
      </div>
    </div>

    <div class="lg:col-span-5 lg:sticky lg:top-40">
      <nav class="flex mb-4 text-[10px] tracking-[0.2em] text-stone-400 uppercase">
        <a routerLink="/products" class="hover:text-amber-600">Tienda</a>
        <span class="mx-2">/</span>
        <span class="text-stone-900 font-bold">{{ product.name }}</span>
      </nav>

      <h1 class="text-3xl font-headline italic text-stone-900 mb-2 leading-tight">{{ product.name }}</h1>
      <p class="text-2xl text-primary font-headline mb-6">S/ {{ product.price | number:'1.2-2' }}</p>
      <p class="text-sm text-stone-600 mb-6">{{ product.description }}</p>

      <div class="mb-4">
        <h3 class="text-xs font-label tracking-[0.2em] uppercase text-stone-400 mb-2">Categoría</h3>
        <div class="text-sm text-stone-700">{{ product.category }}</div>
      </div>

      <div class="mb-6">
        <h3 class="text-xs font-label tracking-[0.2em] uppercase text-stone-400 mb-2">Stock</h3>
        <div>
          <span *ngIf="product.stock > 0" class="text-sm text-green-600">En stock: {{ product.stock }}</span>
          <span *ngIf="product.stock <= 0" class="text-sm text-error">Agotado</span>
        </div>
      </div>

      <div class="space-y-4">
        <div class="flex gap-3">
          <button class="px-4 py-3 border border-stone-200 text-[12px] font-bold hover:bg-stone-50">XS</button>
          <button class="px-4 py-3 border border-stone-200 text-[12px] font-bold">S</button>
          <button class="px-4 py-3 border border-stone-200 text-[12px] font-bold">M</button>
          <button class="px-4 py-3 border border-stone-200 text-[12px] font-bold">L</button>
          <button class="px-4 py-3 border border-stone-200 text-[12px] font-bold">XL</button>
        </div>

        <button
          (click)="addToCart()"
          [disabled]="product.stock <= 0"
          class="w-full py-4 bg-primary text-on-primary font-bold tracking-widest uppercase rounded-lg hover:bg-primary-dim transition-colors disabled:opacity-50"
        >
          Agregar al carrito
        </button>

        <button routerLink="/products" class="w-full py-3 border border-stone-200 text-stone-900 font-bold rounded-lg">Volver al catálogo</button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="!isLoading && errorMessage" class="pt-8 text-center text-sm text-error">{{ errorMessage }}</div>
