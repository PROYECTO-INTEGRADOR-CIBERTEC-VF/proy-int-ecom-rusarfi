<div
  *ngIf="notification()"
  class="fixed right-6 max-w-sm w-full shadow-xl rounded-lg pointer-events-auto"
  style="top: calc(var(--navbar-height, 64px) + 0.5rem); z-index: 9999;"
>
  <div class="rounded-lg shadow-lg overflow-hidden ring-1 ring-black ring-opacity-5" [ngClass]="containerClasses">
    <div class="p-4">
      <div class="flex items-start">
        <div class="flex-shrink-0">
          <span class="material-symbols-outlined">{{ icon }}</span>
        </div>
        <div class="ml-3 w-0 flex-1 pt-0.5">
          <p class="text-sm font-medium">
            {{ notification()?.summary }}
          </p>
          <p *ngIf="notification()?.detail" class="mt-1 text-sm">
            {{ notification()?.detail }}
          </p>
        </div>
        <div class="ml-4 flex-shrink-0 flex">
          <button
            (click)="close()"
            class="inline-flex rounded-md text-current opacity-70 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-fixed"
            type="button"
          >
            <span class="sr-only">Cerrar</span>
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
